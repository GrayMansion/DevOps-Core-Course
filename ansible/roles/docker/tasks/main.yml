---
# Docker installation block with error handling
- name: Install Docker Engine
  become: true
  tags:
    - docker_install
    - docker
  block:
    - name: Install prerequisites for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_facts['distribution_release'] }} stable
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true
      notify: Restart docker

  rescue:
    - name: Wait before retrying Docker installation
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update after GPG key failure
      ansible.builtin.apt:
        update_cache: true

    - name: Retry Docker package installation
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart docker

  always:
    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      failed_when: false

# Docker configuration block
- name: Configure Docker
  become: true
  tags:
    - docker_config
    - docker
  block:
    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true

    - name: Install python3-docker for Ansible docker modules
      ansible.builtin.apt:
        name: python3-docker
        state: present
