apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-info.fullname" . }}
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "devops-info.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if .Values.vault.enabled }}
      annotations:
        {{- include "devops-info.vaultAnnotations" . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "devops-info.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      serviceAccountName: {{ include "devops-info.serviceAccountName" . }}
      containers:
        - name: {{ include "devops-info.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- include "devops-info.envVars" . | nindent 12 }}
          {{- if .Values.secret.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "devops-info.secretName" . }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.probes.startup | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}