apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-info.fullname" . }}
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "devops-info.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.config.enabled }}
        checksum/config-file: {{ include (print $.Template.BasePath "/configmap-file.yaml") . | sha256sum }}
        checksum/config-env: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        {{- include "devops-info.vaultAnnotations" . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "devops-info.selectorLabels" . | nindent 8 }}
        component: api
    spec:
      serviceAccountName: {{ include "devops-info.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ include "devops-info.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- include "devops-info.envVars" . | nindent 12 }}
          {{- if .Values.secret.enabled }}
          envFrom:
            - secretRef:
                name: {{ include "devops-info.secretName" . }}
            {{- if .Values.config.enabled }}
            - configMapRef:
                name: {{ include "devops-info.envConfigMapName" . }}
            {{- end }}
          {{- else if .Values.config.enabled }}
          envFrom:
            - configMapRef:
                name: {{ include "devops-info.envConfigMapName" . }}
          {{- end }}
          volumeMounts:
            {{- if .Values.config.enabled }}
            - name: config-volume
              mountPath: {{ .Values.config.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.probes.startup | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        {{- if .Values.config.enabled }}
        - name: config-volume
          configMap:
            name: {{ include "devops-info.fileConfigMapName" . }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-info.pvcName" . }}
        {{- end }}